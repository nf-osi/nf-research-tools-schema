name: Check Investigator Synapse IDs

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install synapseclient pandas

      - name: Check for missing Synapse user IDs
        env:
          SYNAPSE_AUTH_TOKEN: ${{ secrets.SYNAPSE_AUTH_TOKEN }}
        run: python tool_coverage/scripts/check_investigator_synapse_ids.py

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: investigator-synapse-id-report
          path: tool_coverage/outputs/investigator_synapse_id_report.csv
          retention-days: 90
