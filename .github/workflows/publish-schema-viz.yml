# Generate LinkML schema docs and publish to GitHub Pages (main) or upload preview (PR)
name: Schema docs

on:
  push:
    branches:
      - main
    paths:
      - 'modules/**'
      - 'docs/schema/index.html'
      - '.github/workflows/publish-schema-viz.yml'
  pull_request:
    paths:
      - 'modules/**'
      - 'docs/schema/index.html'
      - '.github/workflows/publish-schema-viz.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linkml
        run: pip install linkml

      - name: Validate schema
        run: gen-yaml modules/nf_research_tools.yaml > /dev/null

      - name: Generate markdown reference docs
        run: gen-doc modules/nf_research_tools.yaml -d _site --include-top-level-diagram --diagram-type mermaid_class_diagram

      - name: Copy static overview page
        run: cp docs/schema/index.html _site/index.html

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: schema-docs
          path: _site
          retention-days: 14

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: schema-docs
          path: _site

      - name: Setup GH Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  preview:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write

    steps:
      - name: Post preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const previewUrl = `https://htmlpreview.github.io/?https://github.com/${context.repo.owner}/${context.repo.repo}/blob/${branch}/docs/schema/index.html`;
            const body = [
              '### Schema docs preview',
              '',
              `[**Open preview**](${previewUrl}) · built from \`${context.sha.slice(0, 7)}\``,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Schema docs preview'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
