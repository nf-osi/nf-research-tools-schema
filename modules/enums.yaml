    permissible_values:
      Homo sapiens: {}
      Mus musculus: {}
      Mus musculus (humanized): {}
      Rattus norvegicus: {}
      Drosophila melanogaster: {}
      Saccharomyces cerevisiae: {}
      Rhesus macaque: {}
      Cricetulus griseus: {}
      Xenopus laevis: {}
      Canis lupus familiaris: {}
      Pan troglodytes: {}
      Gallus gallus: {}
      Sus scrofa: {}
      Oryctolagus cuniculus: {}
      Danio rerio: {}
      Escherichia coli: {}

  SexEnum:
    description: Biological sex.
    permissible_values:
      Male:
        meaning: NCIT:C20197
      Female:
        meaning: NCIT:C16576
      Unknown: {}

  YesNoUnknownEnum:
    description: Yes, No, or Unknown.
    permissible_values:
      "Yes": {}
      "No": {}
      Unknown: {}

  UsageRequirementEnum:
    description: Known restrictions on use of the resource.
