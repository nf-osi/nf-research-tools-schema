id: https://w3id.org/nf-research-tools/enums
name: nf_research_tools_enums
title: Shared Enumerations
description: Enumerations used across multiple modules.

prefixes:
  nftools: https://w3id.org/nf-research-tools/
  linkml: https://w3id.org/linkml/
  NCIT: http://purl.obolibrary.org/obo/NCIT_

default_prefix: nftools
default_range: string

imports:
  - linkml:types

enums:

  ResourceTypeEnum:
    description: Type of NF research resource.
    permissible_values:
      Animal Model: {}
      Cell Line: {}
      Antibody: {}
      Genetic Reagent: {}
      Biobank: {}
      Computational Tool: {}
      Organoid Protocol: {}
      Patient-Derived Model: {}
      Clinical Assessment Tool: {}

  GeneticDisorderEnum:
    description: Genetic disorders relevant to NF research.
    permissible_values:
      Neurofibromatosis type 1:
        meaning: NCIT:C3273
      Neurofibromatosis type 2:
        meaning: NCIT:C3274
      Schwannomatosis:
        meaning: NCIT:C85188
      No known genetic disorder: {}

  TumorTypeEnum:
    description: Tumor types relevant to NF research.
    permissible_values:
      cutaneous neurofibroma: {}
      plexiform neurofibroma: {}
      atypical neurofibroma: {}
      schwannoma: {}
      meningioma: {}
      malignant peripheral nerve sheath tumor: {}
      low grade glioma: {}
      high grade glioma: {}
      pheochromocytoma: {}
      optic nerve glioma: {}
      neurofibroma NOS: {}
      diffuse infiltrating neurofibroma: {}
      brain NOS: {}
      Other: {}

