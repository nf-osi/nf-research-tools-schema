id: https://w3id.org/nf-research-tools
name: nf_research_tools
title: NF Research Tools Central Schema
description: >-
  Data model for the NF Research Tools Central registry, covering 9 types
  of NF research resources (animal models, cell lines, antibodies, genetic
  reagents, biobanks, computational tools, organoid protocols, patient-derived
  models, and clinical assessment tools) along with supporting entities
  (publications, investigators, funders, vendors, observations).
license: https://creativecommons.org/licenses/by/4.0/
version: 2.0.0

prefixes:
  nftools: https://w3id.org/nf-research-tools/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  NCIT: http://purl.obolibrary.org/obo/NCIT_
  MP: http://purl.obolibrary.org/obo/MP_
  synapse: "https://www.synapse.org/Synapse:"

default_prefix: nftools
default_range: string

imports:
  - linkml:types
  - enums
  - tool_base
  - donor
  - mutation
  - publication
  - investigator
  - funder
  - vendor
  - observation
  - resource_application
  - mixins
  - animal_model
  - cell_line
  - antibody
  - genetic_reagent
  - biobank
  - computational_tool
  - organoid_protocol
  - patient_derived_model
  - clinical_assessment_tool
