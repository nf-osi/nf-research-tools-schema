id: https://w3id.org/nf-research-tools/investigator
name: nf_research_tools_investigator
title: Investigator
description: Investigators who developed research tools.

prefixes:
  nftools: https://w3id.org/nf-research-tools/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/

default_prefix: nftools
default_range: string

imports:
  - linkml:types

classes:

  Investigator:
    annotations:
      synapse_table_id: syn26486833
    description: >-
      A person who carries out a formal inquiry or investigation
      into the development of the resource.
    class_uri: schema:Person
    slots:
      - investigatorId
      - orcid
      - investigatorName
      - institution
      - investigatorSynapseId

slots:

  investigatorId:
    identifier: true
    description: A unique identifier for the investigator.
    required: true

  orcid:
    description: The ORCID iD of the investigator.

  investigatorName:
    description: The name of the investigator.
    required: true
    slot_uri: schema:name

  institution:
    description: The institution of the investigator.

  investigatorSynapseId:
    description: The Synapse identifier for the investigator.
