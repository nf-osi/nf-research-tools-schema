id: https://w3id.org/nf-research-tools/funder
name: nf_research_tools_funder
title: Funder
description: Funders of NF research tool development.

prefixes:
  nftools: https://w3id.org/nf-research-tools/
  linkml: https://w3id.org/linkml/
  schema: http://schema.org/

default_prefix: nftools
default_range: string

imports:
  - linkml:types

classes:

  Funder:
    annotations:
      synapse_table_id: syn26486830
    description: >-
      A person or organization that provides money for a particular resource.
    class_uri: schema:Organization
    slots:
      - funderId
      - funderName

slots:

  funderId:
    identifier: true
    description: A unique identifier for the funder.

  funderName:
    description: >-
      The name of the person or agency that funded the development
      of the resource.
    slot_uri: schema:name
