id: https://w3id.org/nf-research-tools/cell_line
name: nf_research_tools_cell_line
title: Cell Line
description: Cell lines used in NF research.

prefixes:
  nftools: https://w3id.org/nf-research-tools/
  linkml: https://w3id.org/linkml/

default_prefix: nftools
default_range: string

imports:
  - linkml:types
  - tool_base
  - mixins
  - donor

classes:

  CellLine:
    is_a: Tool
    annotations:
      synapse_table_id: syn26486823
    mixins:
      - HasGeneticDisorder
    slots:
      - donor
    description: >-
      A cell culture selected for uniformity from a cell population
      derived from a usually homogeneous tissue source.
    attributes:
      organ:
        description: The organ the cell line is derived from.
        range: OrganEnum
      tissue:
        description: The tissue the cell line is derived from.
        range: TissueEnum
      cellLineCategory:
        description: The category to which the cell line belongs.
        range: CellLineCategoryEnum
      originYear:
        description: The year the cell line originated.
        range: integer
      strProfile:
        description: Short tandem repeat profile information.
      populationDoublingTime:
        description: Time for cell line to double.
      resistance:
        description: List of compounds the cell line has been selected for.
        multivalued: true
      cultureMedia:
        description: >-
          The base culture medium and supplements used to maintain
          the cell line (e.g. RPMI supplemented with 10% FBS).
    slot_usage:
      resourceType:
        ifabsent: string(Cell Line)

enums:

  OrganEnum:
    description: Organs from which cell lines can be derived.
    permissible_values:
      Biliary Tract: {}
      Bladder: {}
      Bone Marrow: {}
      Brain: {}
      Breast: {}
      Bronchial Tree: {}
      Duct: {}
      Epididymis: {}
      Esophagus: {}
      Fallopian Tube: {}
      Gallbladder: {}
      Gland: {}
      Gonad: {}
      Heart: {}
      Intestine: {}
      Kidney: {}
      Liver: {}
      Lung: {}
      Lymph Node: {}
      Ear: {}
      Eye: {}
      Nose: {}
      Tongue: {}
      Pancreas: {}
      Penis: {}
      Seminal Vesicle: {}
      Skin: {}
      Spermatic Cord: {}
      Spinal Cord: {}
      Spleen: {}
      Stomach: {}
      Thymus Gland: {}
      Thyroid Gland: {}
      Tonsil: {}
      Trachea: {}
      Tracheobronchial Tree: {}
      Ureter: {}
      Urethra: {}
      Uterus: {}
      Vagina: {}
      Vulva: {}

  TissueEnum:
    description: Tissues from which cell lines can be derived.
    permissible_values:
      Blood: {}
      Bone marrow: {}
      Buccal mucosa: {}
      Buffy coat: {}
      Cerebral cortex: {}
      Dorsal root ganglion: {}
      Embryonic tissue: {}
      Meninges: {}
      Nerve tissue: {}
